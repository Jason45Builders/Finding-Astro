name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "apps/web/package-lock.json"
      - run: npm ci
        working-directory: ./apps/web
      - run: npm run typecheck
        working-directory: ./apps/web
      - run: npm run build
        working-directory: ./apps/web
